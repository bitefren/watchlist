<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Watchlist</title>
<link href="https://fonts.googleapis.com/css2?family=Philosopher:ital,wght@0,400;0,700;1,400&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d070f;--glass:rgba(255,182,208,.04);--glass-border:rgba(244,114,182,.1);
  --glass-hover:rgba(255,150,180,.07);--accent:#f472b6;--accent2:#e879a0;
  --gold:#fbbf24;--teal:#f9a8d4;--text:#fce7f3;--muted:#9d6b7e;
}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;position:relative}
#bg-scene{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
#bg-scene svg{width:100%;height:100%}
.star{animation:twinkle 3s infinite alternate}
@keyframes twinkle{0%{opacity:.15}100%{opacity:.55}}
#app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:2rem 1.25rem 4rem}
@keyframes fadeDown{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:none}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes countUp{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}

/* ── HEADER ── */
header{text-align:center;margin-bottom:2rem;animation:fadeDown .6s ease both}
header h1{font-family:'Philosopher',serif;font-size:clamp(46px,8vw,72px);font-weight:700;font-style:italic;background:linear-gradient(135deg,#fce7f3,#f472b6,#ec4899,#f9a8d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:.04em}

/* ── WHO BAR ── */
.who-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--glass);border:1px solid var(--glass-border);border-radius:14px;padding:10px 16px;margin-bottom:1.25rem;backdrop-filter:blur(12px);animation:fadeUp .5s .1s ease both}
.who-bar span{font-size:13px;color:var(--muted)}
#nameDisplay{font-size:13px;color:var(--accent);font-weight:600}

/* ── ADD BAR ── */
.add-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;animation:fadeUp .5s .15s ease both;position:relative;z-index:50}
.add-bar input,.add-bar select{padding:10px 12px;background:var(--glass);border:1px solid var(--glass-border);border-radius:10px;color:var(--text);font-size:15px;font-family:'Nunito',sans-serif;backdrop-filter:blur(8px);transition:border-color .2s}
.add-bar input:focus,.add-bar select:focus{outline:none;border-color:var(--accent)}
.add-bar select option{background:#1a0a14}
.add-bar .title-inp{flex:1;min-width:160px}
.add-bar .type-sel{width:145px}
.btn-add{all:unset;box-sizing:border-box;padding:10px 20px;background:linear-gradient(135deg,#ec4899,#f472b6);border-radius:10px;color:#fff;font-size:15px;font-weight:600;font-family:'Nunito',sans-serif;cursor:pointer;white-space:nowrap;transition:opacity .2s}
.btn-add:hover{opacity:.85}

/* ── AUTOCOMPLETE ── */
.autocomplete-wrap{position:relative;flex:1;min-width:160px;z-index:9999}
.autocomplete-wrap input{width:100%}
.suggestions{position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:9999;background:#1a0a14;border:1px solid rgba(244,114,182,.3);border-radius:10px;overflow:hidden;max-height:260px;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.6)}
.sug-item{display:flex;align-items:center;gap:10px;padding:8px 12px;cursor:pointer;transition:background .15s}
.sug-item:hover{background:rgba(244,114,182,.12)}
.sug-img{width:36px;height:52px;object-fit:cover;border-radius:4px;flex-shrink:0;background:rgba(255,255,255,.05)}
.sug-img-placeholder{width:36px;height:52px;border-radius:4px;background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sug-info{flex:1;min-width:0}
.sug-title{font-size:14px;color:#fff;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sug-year{font-size:12px;color:var(--muted)}

/* ── TABS ── */
.main-tabs{display:flex;gap:4px;margin-bottom:1.25rem;background:var(--glass);border:1px solid var(--glass-border);border-radius:12px;padding:4px;animation:fadeUp .5s .17s ease both}
.main-tab{all:unset;box-sizing:border-box;flex:1;text-align:center;padding:8px 16px;border-radius:9px;color:var(--muted);font-size:14px;font-weight:600;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .2s}
.main-tab.active{background:linear-gradient(135deg,#ec4899,#f472b6);color:#fff}
.main-tab:hover:not(.active){color:var(--text);background:rgba(255,150,180,.08)}

/* ── TOOLBAR ── */
.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:1rem;position:relative;z-index:10}
.sort-sel{all:unset;box-sizing:border-box;padding:7px 12px;background:#130a10;border:1px solid var(--glass-border);border-radius:8px;color:var(--text);font-size:13px;font-family:'Nunito',sans-serif;cursor:pointer}
.sort-sel option{background:#1a0a14}
.btn-surprise{all:unset;box-sizing:border-box;padding:7px 14px;background:#130a10;border:1px solid rgba(244,114,182,.35);border-radius:8px;color:var(--accent);font-size:13px;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-surprise:hover{background:rgba(244,114,182,.1)}
.btn-view-toggle{all:unset;box-sizing:border-box;padding:7px 12px;background:#130a10;border:1px solid var(--glass-border);border-radius:8px;color:var(--muted);font-size:13px;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .2s}
.btn-view-toggle:hover{color:var(--text)}
.search-inp{padding:7px 12px;background:#130a10;border:1px solid var(--glass-border);border-radius:8px;color:var(--text);font-size:13px;font-family:'Nunito',sans-serif;flex:1;min-width:120px;transition:border-color .2s}
.search-inp:focus{outline:none;border-color:var(--accent)}

/* ── FILTERS ── */
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem;position:relative;z-index:10}
.fbtn{all:unset;box-sizing:border-box;padding:5px 14px;border:1px solid var(--glass-border);border-radius:20px;background:#0d070f;color:var(--muted);font-size:13px;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .15s}
.fbtn:hover{color:var(--text);border-color:rgba(244,114,182,.4)}
.fbtn.active{background:rgba(244,114,182,.15);border-color:var(--accent);color:var(--accent)}

/* ── STATS ── */
.stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:1.25rem}
.stat{flex:1;min-width:80px;background:var(--glass);border:1px solid var(--glass-border);border-radius:12px;padding:10px 14px;text-align:center;backdrop-filter:blur(10px)}
.stat-n{font-size:28px;font-weight:700;color:#fff;font-family:'Philosopher',serif;animation:countUp .3s ease}
.stat-l{font-size:13px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}

/* ── CARDS ── */
.card{background:var(--glass);border:1px solid var(--glass-border);border-radius:16px;margin-bottom:10px;display:flex;align-items:flex-start;gap:0;backdrop-filter:blur(14px);transition:border-color .2s,background .2s,transform .15s;animation:fadeUp .4s ease both;overflow:hidden}
.card:hover{border-color:rgba(244,114,182,.25);background:var(--glass-hover);transform:translateY(-1px)}
.card.done{opacity:.5}
.card.highlighted{border-color:var(--accent);box-shadow:0 0 18px rgba(244,114,182,.2)}
/* compact view */
.card.compact{border-radius:10px;margin-bottom:6px}
.card.compact .card-poster,.card.compact .card-poster-placeholder{width:48px;min-width:48px;height:68px}
.card.compact .card-poster-placeholder{font-size:18px}
.card.compact .card-title{font-size:15px}
/* poster */
.card-poster{width:80px;min-width:80px;height:110px;object-fit:cover;display:block;transition:transform .3s}
.card:hover .card-poster{transform:scale(1.04)}
.card-poster-placeholder{width:80px;min-width:80px;height:110px;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;background:linear-gradient(160deg,#1a0a14,#0d070f)}
.card-body{flex:1;min-width:0;padding:12px 14px;display:flex;gap:10px;align-items:flex-start}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:6px}
.dot-pending{background:var(--muted)}
.dot-watching{background:#f472b6;box-shadow:0 0 8px rgba(244,114,182,.6)}
.dot-done{background:#f9a8d4;box-shadow:0 0 8px rgba(249,168,212,.5)}
.card-info{flex:1;min-width:0}
.card-title{font-family:'Philosopher',serif;font-size:19px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:5px}
.badge{font-size:12px;padding:3px 9px;border-radius:8px;font-weight:600;font-family:'Nunito',sans-serif;letter-spacing:.04em;text-transform:uppercase}
.badge.serie{background:rgba(244,114,182,.15);color:#f472b6;border:1px solid rgba(244,114,182,.3)}
.badge.pelicula{background:rgba(251,191,36,.12);color:#fbbf24;border:1px solid rgba(251,191,36,.25)}
.badge.anime{background:rgba(236,72,153,.12);color:#ec4899;border:1px solid rgba(236,72,153,.25)}
.badge.pelianime{background:rgba(99,102,241,.12);color:#818cf8;border:1px solid rgba(99,102,241,.3)}
.badge.kdrama{background:rgba(251,113,133,.12);color:#fb7185;border:1px solid rgba(251,113,133,.3)}
.badge.libro{background:rgba(249,168,212,.12);color:#f9a8d4;border:1px solid rgba(249,168,212,.3)}
.card-meta{font-size:13px;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap;margin-bottom:7px;align-items:center}
.done-date{color:rgba(249,168,212,.6);font-size:12px}
.days-watching{font-size:11px;color:rgba(244,114,182,.6);font-weight:500}
.stars-display{display:flex;gap:2px;margin-bottom:6px}
.star-icon{font-size:16px;cursor:pointer;transition:transform .1s;opacity:.25;color:var(--gold)}
.star-icon.lit{opacity:1}
.star-icon:hover{transform:scale(1.2);opacity:.8}
.progress-bar{height:3px;background:rgba(255,255,255,.07);border-radius:2px;margin-bottom:8px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#ec4899,#f9a8d4);border-radius:2px;transition:width .4s ease}
.card-actions{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.btn-sm{all:unset;box-sizing:border-box;padding:4px 11px;font-size:13px;font-family:'Nunito',sans-serif;border:1px solid var(--glass-border);border-radius:7px;background:#130a10;color:var(--muted);cursor:pointer;transition:all .15s}
.btn-sm:hover{background:rgba(255,255,255,.07);color:var(--text)}
.btn-sm.blue{border-color:rgba(244,114,182,.4);color:var(--accent)}
.btn-sm.blue:hover{background:rgba(244,114,182,.12)}
.btn-sm.green{border-color:rgba(249,168,212,.4);color:#f9a8d4}
.btn-sm.green:hover{background:rgba(249,168,212,.1)}
.btn-sm.red{border-color:rgba(248,113,113,.3);color:#f87171}
.btn-sm.red:hover{background:rgba(248,113,113,.1)}
.btn-sm.gold{border-color:rgba(251,191,36,.3);color:var(--gold)}
.progress-fields{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:8px}
.pf-group{display:flex;align-items:center;gap:6px}
.pf-group label{font-size:13px;color:var(--muted)}
.pf-group input{width:68px;padding:3px 8px;background:rgba(255,255,255,.04);border:1px solid var(--glass-border);border-radius:7px;color:var(--text);font-size:13px;font-family:'Nunito',sans-serif}
.pf-group input:focus{outline:none;border-color:var(--accent)}
.pf-group span{font-size:13px;color:var(--muted)}
.note-field{width:100%;padding:5px 10px;background:rgba(255,255,255,.03);border:1px solid var(--glass-border);border-radius:8px;color:var(--text);font-size:13px;font-family:'Nunito',sans-serif;resize:none;height:32px;margin-bottom:2px;transition:height .2s,border-color .2s}
.note-field:focus{outline:none;border-color:var(--accent);height:64px}
.edit-title-inp{width:100%;padding:4px 8px;background:rgba(255,255,255,.05);border:1px solid var(--accent);border-radius:7px;color:#fff;font-size:17px;font-family:'Philosopher',serif;font-weight:700;margin-bottom:5px}
.edit-title-inp:focus{outline:none}
/* history */
.history-item{font-size:11px;color:rgba(249,168,212,.45);margin-top:4px;font-style:italic}
/* star modal */
.star-modal{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:rgba(7,0,10,.8);backdrop-filter:blur(8px)}
.star-modal-box{background:#1a0a14;border:1px solid rgba(244,114,182,.3);border-radius:16px;padding:2rem;text-align:center;max-width:300px;width:90%;animation:fadeUp .3s ease}
.star-modal-title{font-family:'Philosopher',serif;font-size:20px;color:#fff;margin-bottom:.5rem}
.star-modal-sub{font-size:13px;color:var(--muted);margin-bottom:1.5rem}
.star-modal-stars{display:flex;gap:8px;justify-content:center;margin-bottom:1.5rem}
.star-modal-stars span{font-size:32px;cursor:pointer;opacity:.3;transition:all .15s;color:var(--gold)}
.star-modal-stars span.lit{opacity:1}
.star-modal-stars span:hover{transform:scale(1.2)}
.star-modal-skip{all:unset;font-size:13px;color:var(--muted);cursor:pointer;text-decoration:underline;font-family:'Nunito',sans-serif}
/* drag handle */
.drag-handle{cursor:grab;color:var(--muted);font-size:16px;padding:0 4px;user-select:none;flex-shrink:0;margin-top:4px}
.drag-handle:active{cursor:grabbing}
.card.dragging{opacity:.4;border:2px dashed var(--accent)}
.card.drag-over{border-color:var(--accent);background:rgba(244,114,182,.08)}

/* ── RECOMMENDATIONS ── */
.rec-header{display:flex;align-items:center;margin-bottom:1rem}
.rec-title{font-family:'Philosopher',serif;font-size:26px;font-weight:700;font-style:italic;background:linear-gradient(135deg,#fce7f3,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.rec-timestamp{font-size:11px;color:var(--muted);margin-left:12px;margin-top:4px}
.mood-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.mood-btn{all:unset;box-sizing:border-box;padding:6px 14px;border:1px solid rgba(244,114,182,.2);border-radius:20px;background:#130a10;color:#9d6b7e;font-size:13px;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .2s;white-space:nowrap}
.mood-btn:hover{border-color:rgba(244,114,182,.5);color:#f9a8d4;background:#1f0d18}
.mood-btn.active{background:rgba(244,114,182,.18);border-color:#f472b6;color:#f472b6;font-weight:600}
.rec-controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:1.5rem}
.btn-rec{all:unset;box-sizing:border-box;padding:9px 20px;background:linear-gradient(135deg,#ec4899,#f472b6);border-radius:10px;color:#fff;font-size:14px;font-weight:600;font-family:'Nunito',sans-serif;cursor:pointer;transition:opacity .2s;white-space:nowrap}
.btn-rec:hover{opacity:.85}
.btn-rec:disabled{opacity:.45;cursor:not-allowed}
.btn-rec-outline{all:unset;box-sizing:border-box;padding:9px 16px;background:#130a10;border:1px solid rgba(244,114,182,.35);border-radius:10px;color:#f472b6;font-size:14px;font-weight:600;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-rec-outline:hover{background:rgba(244,114,182,.1)}
.rec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:16px}
.rec-card{background:rgba(255,182,208,.03);border:1px solid rgba(244,114,182,.1);border-radius:14px;overflow:hidden;transition:transform .2s,border-color .25s,box-shadow .25s;display:flex;flex-direction:column}
.rec-card:hover{transform:translateY(-5px);border-color:rgba(244,114,182,.4);box-shadow:0 8px 30px rgba(244,114,182,.12)}
.rec-poster-wrap{position:relative;aspect-ratio:2/3;overflow:hidden;background:#130a10;flex-shrink:0}
.rec-poster{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
.rec-card:hover .rec-poster{transform:scale(1.04)}
.rec-poster-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:38px;background:linear-gradient(160deg,#1a0a14,#0d070f)}
.rec-badge{position:absolute;top:8px;left:8px;font-size:10px;padding:3px 8px;border-radius:6px;font-weight:700;font-family:'Nunito',sans-serif;text-transform:uppercase;letter-spacing:.05em;backdrop-filter:blur(8px)}
.rec-badge.serie{background:rgba(244,114,182,.85);color:#fff}
.rec-badge.pelicula{background:rgba(251,191,36,.9);color:#1a0a00}
.rec-badge.anime{background:rgba(236,72,153,.85);color:#fff}
.rec-badge.pelianime{background:rgba(99,102,241,.85);color:#fff}
.rec-badge.kdrama{background:rgba(251,113,133,.85);color:#fff}
.rec-badge.libro{background:rgba(249,168,212,.9);color:#1a0a14}
.rec-info{padding:10px 12px 12px;flex:1;display:flex;flex-direction:column;gap:4px}
.rec-name{font-family:'Philosopher',serif;font-size:14px;font-weight:700;color:#fce7f3;line-height:1.3}
.rec-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.rec-score{font-size:12px;color:#fbbf24;font-weight:600}
.rec-platform{font-size:11px;color:rgba(244,114,182,.75);font-weight:500}
.rec-reason{font-size:12px;color:#9d6b7e;line-height:1.4;flex:1}
.rec-why-text{font-size:12px;color:rgba(249,168,212,.55);line-height:1.5;font-style:italic;margin-top:2px;display:none}
.rec-why-text.show{display:block}
.rec-actions{margin-top:8px;display:flex;flex-direction:column;gap:6px}
.rec-add-btn{all:unset;box-sizing:border-box;width:100%;padding:8px;text-align:center;background:linear-gradient(135deg,#ec4899,#f472b6);border-radius:8px;color:#fff;font-size:13px;font-weight:600;font-family:'Nunito',sans-serif;cursor:pointer;transition:opacity .15s}
.rec-add-btn:hover{opacity:.85}
.rec-add-btn.added{background:#1f0d18;border:1px solid rgba(249,168,212,.3);color:#f9a8d4;cursor:default;opacity:1}
.rec-vote{display:flex;gap:5px}
.rec-vote button{all:unset;box-sizing:border-box;flex:1;padding:6px 4px;text-align:center;background:#130a10;border:1px solid rgba(244,114,182,.18);border-radius:7px;color:#9d6b7e;font-size:11px;font-weight:600;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .15s}
.rec-vote button:hover{background:#1f0d18;border-color:rgba(244,114,182,.4);color:#f9a8d4}
.rec-loading{text-align:center;color:var(--muted);font-size:14px;padding:3rem;display:none}
.rec-loading.show{display:block}
.rec-loading-dots::after{content:'.';animation:dots 1.2s infinite}
@keyframes dots{0%{content:'.'}33%{content:'..'}66%{content:'...'}}

/* ── MISC ── */
.empty{text-align:center;color:var(--muted);font-size:15px;padding:4rem 0}
.sync{font-size:11px;color:var(--muted);text-align:right;margin-bottom:.75rem}
.sync.ok{color:rgba(249,168,212,.6)}
.sync.err{color:rgba(248,113,113,.6)}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(236,72,153,.2);border:1px solid rgba(244,114,182,.4);color:#fce7f3;padding:10px 22px;border-radius:12px;font-size:14px;font-family:'Nunito',sans-serif;backdrop-filter:blur(12px);opacity:0;transition:all .3s;pointer-events:none;z-index:9998}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}
@media(max-width:600px){
  .add-bar{flex-direction:column}
  .add-bar .type-sel{width:100%}
  .toolbar{flex-direction:column;align-items:flex-start}
  .btn-surprise,.sort-sel,.search-inp{width:100%}
  .card-poster,.card-poster-placeholder{width:64px;min-width:64px;height:90px}
  .rec-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
}
</style>
</head>
<body>

<div id="bg-scene">
<svg viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <defs>

// ── ADD ITEM ──
function addItem(){
  const title=document.getElementById('newTitle').value.trim();
  if(!title){showToast('Escribe un titulo primero');return;}
  const type=document.getElementById('newType').value;
  const id=Date.now().toString();
  ref.child(id).set({id,title,type,total:null,ep:0,min:0,status:'pending',
    addedBy:myName||'Anon',ts:id,stars:0,note:'',doneDate:null,history:[]});
  document.getElementById('newTitle').value='';
  document.getElementById('suggestions').style.display='none';
  fetchPoster(title,type);
}

function deleteItem(id){
  if(!confirm('Eliminar?'))return;
  ref.child(id).remove();
}

// ── STATUS ──
function setStatus(id,status){
  const upd={status};
  const item=items[id];if(!item)return;
  if(status==='done'){
    if(item.total){upd.ep=item.total;upd.min=0;}
    upd.doneDate=new Date().toLocaleDateString('es',{day:'numeric',month:'short',year:'numeric'});
    upd.doneTs=Date.now();
    // add history entry
    const hist=item.history||[];
    hist.push({action:'done',by:myName||'?',ts:Date.now()});
    upd.history=hist.slice(-5);
    // show star modal
    setTimeout(()=>openStarModal(id,item.title),300);
  }
  if(status==='watching'){
    upd.doneDate=null;upd.doneTs=null;
    const hist=item.history||[];
    hist.push({action:'watching',by:myName||'?',ts:Date.now()});
    upd.history=hist.slice(-5);
    if(!item.watchStartTs) upd.watchStartTs=Date.now();
  }
  if(status==='pending'){
    upd.doneDate=null;upd.doneTs=null;upd.watchStartTs=null;
    const hist=item.history||[];
    hist.push({action:'pending',by:myName||'?',ts:Date.now()});
    upd.history=hist.slice(-5);
  }
  ref.child(id).update(upd);
}

// ── PROGRESS ──
function formatMin(val){
  if(!val)return'';
  const v=parseInt(val)||0;
  const h=Math.floor(v/60),m=v%60;
  return h>0?h+':'+(m<10?'0'+m:m):String(v);
}
function parseMin(str){
  if(!str)return 0;
  str=str.trim();
  if(str.includes(':')){const p=str.split(':');return(parseInt(p[0])||0)*60+(parseInt(p[1])||0);}
  return parseInt(str)||0;
}

function updateEp(id,val){
  const v=parseInt(val)||0,item=items[id];if(!item)return;
  const upd={ep:v};
  if(item.total&&v>=item.total){upd.status='done';upd.doneDate=new Date().toLocaleDateString('es',{day:'numeric',month:'short',year:'numeric'});upd.doneTs=Date.now();setTimeout(()=>openStarModal(id,item.title),300);}
  else if(v>0||item.min>0)upd.status='watching';
  else upd.status='pending';
  ref.child(id).update(upd);
}
function updateMin(id,val){
  const v=parseMin(val),item=items[id];if(!item)return;
  const upd={min:v};
  if((item.ep>0||v>0)&&item.status==='pending')upd.status='watching';
  ref.child(id).update(upd);
}
function setStars(id,n){ref.child(id).update({stars:n});showToast(['','★','★★','★★★','★★★★','★★★★★'][n]);}
function saveNote(id,val){const trimmed=val.trim();if(trimmed!==(items[id]?.note||''))ref.child(id).update({note:trimmed});}
function startEditTitle(id){
  const item=items[id];if(!item)return;
  const titleEl=document.getElementById('title-text-'+id);
  const inp=document.getElementById('title-edit-'+id);
  if(titleEl)titleEl.style.display='none';
  if(inp){inp.style.display='block';inp.focus();inp.select();}
}
function saveTitle(id,val){
  const t=val.trim();if(!t)return;
  ref.child(id).update({title:t});
  showToast('Titulo actualizado');
}

// ── DAYS WATCHING ──
function daysWatching(item){
  if(item.status!=='watching'||!item.watchStartTs)return null;
  return Math.max(0,Math.floor((Date.now()-item.watchStartTs)/(1000*60*60*24)));
}

// ── PROGRESS PCT ──
function progressPct(item){
  if(!item.total)return 0;
  const cur=(item.type==='pelicula'||item.type==='pelianime')?item.min:item.ep;
  return Math.min(100,Math.round((cur/item.total)*100));
}
function progressLabel(item){
  if(item.type==='pelicula'||item.type==='pelianime')return item.min?formatMin(item.min):'';
  if(item.type==='libro')return item.ep?'pag '+item.ep:'';
  let s='';
  if(item.ep)s+='ep '+item.ep;
  if(item.min)s+=(s?' · ':'')+formatMin(item.min);
  return s;
}

// ── CANVAS POSTER FALLBACK ──
function generateCanvasPoster(title,type){
  const canvas=document.createElement('canvas');
  canvas.width=185;canvas.height=278;
  const ctx=canvas.getContext('2d');
  // gradient bg by type
  const gradMap={
    serie:['#2d0a1f','#6b1a3a'],pelicula:['#1a1a00','#4a3a00'],
    anime:['#1a0030','#4a0060'],pelianime:['#0a0a30','#1a1a6a'],
    kdrama:['#2d0010','#6b0030'],libro:['#0a1a2d','#1a3a5a']
  };
  const cols=gradMap[type]||gradMap.serie;
  const grad=ctx.createLinearGradient(0,0,185,278);
  grad.addColorStop(0,cols[0]);grad.addColorStop(1,cols[1]);
  ctx.fillStyle=grad;ctx.fillRect(0,0,185,278);
  // subtle pattern
  ctx.strokeStyle='rgba(255,255,255,.04)';ctx.lineWidth=1;
  for(let i=0;i<278;i+=20){ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(185,i);ctx.stroke();}
  // emoji
  ctx.font='48px serif';ctx.textAlign='center';
  ctx.fillText(typeEmoji[type]||'🎬',92,100);
  // title
  ctx.fillStyle='rgba(255,255,255,.9)';ctx.textAlign='center';
  const words=title.split(' ');let lines=[],line='';
  for(const w of words){
    const test=line?line+' '+w:w;
    ctx.font='bold 14px sans-serif';
    if(ctx.measureText(test).width>160&&line){lines.push(line);line=w;}
    else line=test;
  }
  if(line)lines.push(line);
  const startY=lines.length>2?160:170;
  ctx.font='bold 14px sans-serif';
  lines.slice(0,3).forEach((l,i)=>ctx.fillText(l,92,startY+i*20));
  // type label
  ctx.fillStyle='rgba(255,255,255,.4)';ctx.font='11px sans-serif';
  ctx.fillText((type||'').toUpperCase(),92,255);
  return canvas.toDataURL('image/jpeg',.85);
}

// ── TMDB SEARCH ──
async function tmdbSearch(query,type){
  const endpoints=(type==='pelicula'||type==='pelianime')?['movie']:(type==='anime'||type==='pelianime')?['tv','movie']:['tv','movie'];
  const q=encodeURIComponent(query);
  for(const mt of endpoints){
    try{
      const r=await fetch(`https://api.themoviedb.org/3/search/${mt}?api_key=${TMDB_KEY}&query=${q}&language=en-US`);
      const d=await r.json();
      const p=d.results?.find(x=>x.poster_path)?.poster_path;
      if(p)return p;
    }catch(e){}
  }
  try{
    const r=await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${TMDB_KEY}&query=${q}&language=en-US`);
    const d=await r.json();
    const p=(d.results||[]).find(x=>x.poster_path)?.poster_path;
    if(p)return p;
  }catch(e){}
  return null;
}

// ── FETCH POSTER (main list) ──
async function fetchPoster(title,type,titleEn){
  if(posterCache[title]!==undefined)return posterCache[title];
  posterCache[title]=null;
  try{
    if(type==='libro'){
      const q=encodeURIComponent(titleEn||title);
      const r=await fetch(`https://openlibrary.org/search.json?title=${q}&limit=1&fields=cover_i`);
      const d=await r.json();
      const cid=d.docs?.[0]?.cover_i;
      if(cid){posterCache[title]=`https://covers.openlibrary.org/b/id/${cid}-M.jpg`;render();return posterCache[title];}
    } else {
      let poster=titleEn?await tmdbSearch(titleEn,type):null;
      if(!poster)poster=await tmdbSearch(title,type);
      if(!poster){
        const simplified=(titleEn||title).split(/[:\u2013\u2014-]/)[0].trim();
        if(simplified!==(titleEn||title))poster=await tmdbSearch(simplified,type);
      }
      if(!poster){
        try{
          const entity=(type==='pelicula'||type==='pelianime')?'movie':'tvSeason';
          const q=encodeURIComponent(titleEn||title);
          const ir=await fetch(`https://itunes.apple.com/search?term=${q}&entity=${entity}&limit=5`);
          const id=await ir.json();
          const art=(id.results||[]).find(x=>x.artworkUrl100)?.artworkUrl100;
          if(art){posterCache[title]=art.replace('100x100bb','600x600bb');render();return posterCache[title];}
        }catch(e){}
      }
      if(poster){posterCache[title]='https://image.tmdb.org/t/p/w185'+poster;render();}
      else{posterCache[title]=generateCanvasPoster(title,type);render();}
    }
  }catch(e){posterCache[title]=generateCanvasPoster(title,type);render();}
  return posterCache[title];
}

      if(!poster)poster=await tmdbSearch(title,type);
      if(!poster){
        const simplified=(titleEn||title).split(/[:\u2013\u2014-]/)[0].trim();
        if(simplified!==(titleEn||title))poster=await tmdbSearch(simplified,type);
      }
      if(!poster){
        try{
          const entity=(type==='pelicula'||type==='pelianime')?'movie':'tvSeason';
          const q=encodeURIComponent(titleEn||title);

// ── DRAG & DROP ──
function setupDrag(el,id){
  el.setAttribute('draggable',true);
  el.addEventListener('dragstart',e=>{dragSrcId=id;el.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
  el.addEventListener('dragend',()=>el.classList.remove('dragging'));
  el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('drag-over');});
  el.addEventListener('dragleave',()=>el.classList.remove('drag-over'));
  el.addEventListener('drop',e=>{
    e.preventDefault();el.classList.remove('drag-over');
    if(dragSrcId===id)return;
    // swap ts to reorder
    const srcTs=items[dragSrcId]?.ts,dstTs=items[id]?.ts;
    if(srcTs&&dstTs){ref.child(dragSrcId).update({ts:dstTs});ref.child(id).update({ts:srcTs});}
  });
}

// ── RENDER ──
function starsHTML(id,val){
  return [1,2,3,4,5].map(n=>`<span class="star-icon ${n<=(val||0)?'lit':''}" onclick="setStars('${id}',${n})">★</span>`).join('');
}

function render(){
  const sortVal=document.getElementById('sortSel')?.value||'recent';
  const searchQ=(document.getElementById('searchInp')?.value||'').toLowerCase().trim();
  const all=Object.values(items);

  all.sort((a,b)=>{
    if(sortVal==='az')return(a.title||'').localeCompare(b.title||'','es');
    if(sortVal==='stars')return(b.stars||0)-(a.stars||0);
    if(sortVal==='progress')return progressPct(b)-progressPct(a);
    if(sortVal==='days')return(daysWatching(b)||0)-(daysWatching(a)||0);
    return(b.ts||0)-(a.ts||0);
  });

  let list=all;
  if(filter==='pending')list=all.filter(i=>i.status==='pending');
  else if(filter==='watching')list=all.filter(i=>i.status==='watching');
  else if(filter==='done')list=all.filter(i=>i.status==='done');
  else if(['serie','pelicula','anime','pelianime','libro','kdrama'].includes(filter))list=all.filter(i=>i.type===filter);
  if(searchQ)list=list.filter(i=>(i.title||'').toLowerCase().includes(searchQ));

  // fetch missing posters (lazy — only once per title)
  list.forEach(item=>{if(posterCache[item.title]===undefined)fetchPoster(item.title,item.type);});

  const done=all.filter(i=>i.status==='done').length;
  const watching=all.filter(i=>i.status==='watching').length;
  const rated=all.filter(i=>(i.stars||0)>0);
  const avg=rated.length?(rated.reduce((s,i)=>s+(i.stars||0),0)/rated.length).toFixed(1):'-';

  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-n">${all.length}</div><div class="stat-l">Total</div></div>
    <div class="stat"><div class="stat-n">${watching}</div><div class="stat-l">Viendo</div></div>
    <div class="stat"><div class="stat-n">${done}</div><div class="stat-l">Terminados</div></div>
    <div class="stat"><div class="stat-n">${avg}</div><div class="stat-l">Promedio</div></div>
  `;

  if(!list.length){document.getElementById('list').innerHTML='<div class="empty">Nada aqui todavia</div>';return;}

  const isMovieType=i=>i.type==='pelicula'||i.type==='pelianime';
  const isBook=i=>i.type==='libro';

  document.getElementById('list').innerHTML=list.map((item,idx)=>{
    const t=safeType(item.type);
    const pct=progressPct(item);
    const progLbl=progressLabel(item);
    const hl=item.id===highlightId;
    const poster=posterCache[item.title];
    const days=daysWatching(item);
    const lastHist=item.history?.slice(-1)[0];
    const epLabel=isBook(item)?'Pagina':isMovieType(item)?'Minuto':'Episodio';
    const minShow=!isBook(item)&&!isMovieType(item);

    const posterHTML=poster
      ?`<img class="card-poster" src="${poster}" alt="${item.title}" loading="lazy" onerror="this.src='${generateCanvasPoster(item.title,t)}';">`
      :`<div class="card-poster-placeholder">${typeEmoji[t]||'🎬'}</div>`;

    return`<div class="card ${item.status==='done'?'done':''} ${hl?'highlighted':''} ${compactView?'compact':''}" id="card-${item.id}" style="animation-delay:${idx*.03}s">
      <span class="drag-handle" title="Arrastrar">⠿</span>
      ${posterHTML}
      <div class="card-body">
        <div class="dot ${dotCls[item.status]||'dot-pending'}"></div>
        <div class="card-info">
          <input class="edit-title-inp" id="title-edit-${item.id}" style="display:none" value="${(item.title||'').replace(/"/g,'&quot;')}"
            onblur="saveTitle('${item.id}',this.value)" onkeydown="if(event.key==='Enter'){saveTitle('${item.id}',this.value);this.style.display='none';document.getElementById('title-text-${item.id}').style.display='flex';}"/>
          <div class="card-title" id="title-text-${item.id}">
            <span>${item.title||''}</span>
            <span class="badge ${t}">${typeEmoji[t]} ${t}</span>
            ${hl?'<span style="font-size:13px;color:var(--accent)">Esta!</span>':''}
            <button class="btn-sm" style="font-size:11px;padding:2px 7px" onclick="startEditTitle('${item.id}')">Editar</button>
          </div>
          <div class="card-meta">
            <span>${statusLbl[item.status]||item.status}</span>
            ${progLbl?`<span>· ${progLbl}</span>`:''}
            ${item.doneDate?`<span class="done-date">· ${item.doneDate}</span>`:''}
            ${days!==null&&days>=0?`<span class="days-watching">${days===0?'Hoy':days+' dias viendo'}${days>=14?' ⚠️':''}</span>`:''}
          </div>
          ${pct>0||item.ep>0||item.min>0?`<div class="progress-bar"><div class="progress-fill" style="width:${pct||Math.min(100,((item.ep||0)*5))}%"></div></div>`:''}
          <div class="stars-display">${starsHTML(item.id,item.stars)}</div>
          ${item.note?`<div style="font-size:12px;color:rgba(249,168,212,.4);font-style:italic;margin-bottom:5px">"${item.note}"</div>`:''}
          ${lastHist?`<div class="history-item">${lastHist.by} · ${['pending','watching','done'].includes(lastHist.action)?statusLbl[lastHist.action]:lastHist.action} · ${timeAgo(lastHist.ts)}</div>`:''}
          <div class="card-actions">
            ${item.status==='pending'?`<button class="btn-sm blue" onclick="setStatus('${item.id}','watching')">Empezar</button>`:''}
            ${item.status==='watching'?`<button class="btn-sm" onclick="setStatus('${item.id}','pending')">Pendiente</button>`:''}
            ${item.status!=='done'?`<button class="btn-sm green" onclick="setStatus('${item.id}','done')">Terminado</button>`:''}
            ${item.status==='done'?`<button class="btn-sm" onclick="setStatus('${item.id}','watching')">Reanudar</button>`:''}            <button class="btn-sm" onclick="shareItem('${item.id}')">WA</button>
            <button class="btn-sm red" onclick="deleteItem('${item.id}')">Eliminar</button>
          </div>
          <div class="progress-fields">
            <div class="pf-group">
              <label>${epLabel}:</label>
              <input type="${isMovieType(item)?'text':'number'}" min="0" ${isMovieType(item)?'placeholder="00:00"':''} value="${isMovieType(item)?(item.min?formatMin(item.min):''):item.ep||0}"
                onchange="${isMovieType(item)?`updateMin('${item.id}',this.value)`:`updateEp('${item.id}',this.value)`}"
                onkeydown="if(event.key==='Enter'){${isMovieType(item)?`updateMin('${item.id}',this.value)`:`updateEp('${item.id}',this.value)`};this.blur();}"/>
            </div>
            ${minShow?`<div class="pf-group"><label>Minuto:</label><input type="text" placeholder="00:00" value="${item.min?formatMin(item.min):''}" onchange="updateMin('${item.id}',this.value)" onkeydown="if(event.key==='Enter'){updateMin('${item.id}',this.value);this.blur();}"/></div>`:''}
          </div>
          <textarea class="note-field" placeholder="Nota..." onblur="saveNote('${item.id}',this.value)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){saveNote('${item.id}',this.value);this.blur();event.preventDefault();}">${item.note||''}</textarea>
        </div>
      </div>
    </div>`;
  }).join('');

  // setup drag after render
  list.forEach(item=>{
    const el=document.getElementById('card-'+item.id);
    if(el)setupDrag(el,item.id);
  });

  // update view toggle button
  const vt=document.getElementById('viewToggle');
  if(vt)vt.textContent=compactView?'Normal':'Compacto';
}

  const link=await shortenUrl(longLink);
  const text='Mira lo que tengo en mi lista: *'+item.title+'*\n\n'+link;

function timeAgo(ts){
  if(!ts)return'';
  const diff=Date.now()-ts;
  const m=Math.floor(diff/60000),h=Math.floor(diff/3600000),d=Math.floor(diff/86400000);
  if(d>0)return d+'d';if(h>0)return h+'h';if(m>0)return m+'min';return'ahora';
}

async function searchSuggestions(q){
  const type=document.getElementById('newType').value;
  const box=document.getElementById('suggestions');
  const enc=encodeURIComponent(q);
  let results=[];
  try{
    if(type==='libro'){
      const r=await fetch(`https://openlibrary.org/search.json?title=${enc}&limit=6&fields=title,author_name,first_publish_year,cover_i`);
      const d=await r.json();
      results=(d.docs||[]).map(x=>({title:x.title,year:x.first_publish_year||'',poster:x.cover_i?`https://covers.openlibrary.org/b/id/${x.cover_i}-S.jpg`:null,subtitle:x.author_name?.[0]||''}));
    } else {
      const endpoints=(type==='pelicula'||type==='pelianime')?['movie']:(type==='kdrama')?['tv']:['tv','movie'];
      let raw=[];
      for(const mt of endpoints){
        try{
          const [r1,r2]=await Promise.all([
            fetch(`https://api.themoviedb.org/3/search/${mt}?api_key=${TMDB_KEY}&query=${enc}&language=en-US&page=1`),
            fetch(`https://api.themoviedb.org/3/search/${mt}?api_key=${TMDB_KEY}&query=${enc}&language=en-US&page=2`)
          ]);
          const [d1,d2]=await Promise.all([r1.json(),r2.json()]);
          raw=raw.concat([...(d1.results||[]),...(d2.results||[])].map(x=>({
            title:x.title||x.name||x.original_title||x.original_name||'',
            year:(x.release_date||x.first_air_date||'').slice(0,4),
            poster:x.poster_path?'https://image.tmdb.org/t/p/w92'+x.poster_path:null,
            subtitle:'',pop:x.popularity||0
          })));
        }catch(e){}
      }
      raw=raw.filter(x=>x.title.trim()!='');
      const seen=new Set();
      raw.sort((a,b)=>b.pop-a.pop);
      results=raw.filter(x=>{const k=x.title+'|'+x.year;if(seen.has(k))return false;seen.add(k);return true;}).slice(0,10);
    }
  }catch(e){return;}
  currentSuggestions=results;
  if(!results.length){box.style.display='none';return;}
  box.innerHTML=results.map((r,i)=>`
    <div class="sug-item" onclick="pickSuggestion(${i})">
      ${r.poster?`<img class="sug-img" src="${r.poster}" loading="lazy">`:
        `<div class="sug-img-placeholder">${typeEmoji[document.getElementById('newType').value]||'🎬'}</div>`}
      <div class="sug-info">
        <div class="sug-title">${r.title}</div>
        <div class="sug-year">${r.subtitle?r.subtitle+' · ':''}${r.year}</div>
      </div>
    </div>`).join('');
  box.style.display='block';
}

function pickSuggestion(i){
  const s=currentSuggestions[i];if(!s)return;
  document.getElementById('newTitle').value=s.title;
  document.getElementById('suggestions').style.display='none';
  if(s.poster)posterCache[s.title]='https://image.tmdb.org/t/p/w185'+s.poster.replace('w92','w185');
}

// ── RECOMMENDATIONS ──
function setMood(mood,btn){
  if(currentMood===mood){
    currentMood=null;localStorage.removeItem('recMood');
    btn.classList.remove('active');
  } else {
    currentMood=mood;localStorage.setItem('recMood',mood);
    document.querySelectorAll('.mood-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
  }
}

function refreshRecs(){recHistory=[];localStorage.setItem('recHistory','[]');document.getElementById('recGrid').innerHTML='';getRecommendations();}

// Normalize title for comparison (ignore case, accents, articles)
function normalizeTitle(t){
  return(t||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/^(the|el|la|los|las|a|an)\s/,'').trim();
}

async function getRecommendations(){
  const all=Object.values(items);
  if(all.length<2){showToast('Agrega mas titulos primero');return;}
  const btn=document.getElementById('btnRec');
  const loading=document.getElementById('recLoading');
  const grid=document.getElementById('recGrid');
  btn.disabled=true;btn.textContent='...';
  loading.classList.add('show');loading.innerHTML='<span class="rec-loading-dots">Buscando recomendaciones</span>';grid.innerHTML='';

  const typeFilter=document.getElementById('recTypeFilter').value;
  const sorted=[...all].sort((a,b)=>{
    const wa=(a.status==='done'?2:a.status==='watching'?1:0)+(a.stars||0);
    const wb=(b.status==='done'?2:b.status==='watching'?1:0)+(b.stars||0);
    return wb-wa;
  });
  const listStr=sorted.map(i=>`${i.title}(${i.type}${i.stars?','+i.stars+'★':''}${i.status==='done'?',visto':''})`).join(', ');
  const typeCounts={};all.forEach(i=>{typeCounts[i.type]=(typeCounts[i.type]||0)+1;});
  const dominantType=Object.entries(typeCounts).sort((a,b)=>b[1]-a[1])[0]?.[0];
  const moodMap={surprise:'variedad sorprendente',light:'ligero y divertido',intense:'intenso y apasionante',romantic:'romantico con buena historia de amor',continue:'PRIORIZA continuaciones y temporadas siguientes de lo que ya tiene'};
  // Build exclude list with normalized comparison
  const allTitles=all.map(i=>i.title);
  const exclude=[...new Set([...sessionShownRecs,...disliked,...allTitles])].join(', ');
  const typeDescriptions={
    'serie':'series de television live action en ingles o espanol (ejemplos: Breaking Bad, Game of Thrones, Stranger Things) - ABSOLUTAMENTE NO anime, NO animacion, NO k-drama',
    'pelicula':'peliculas live action en ingles o espanol (ejemplos: Inception, Interstellar, El Padrino) - ABSOLUTAMENTE NO animadas, NO anime, NO dibujos',
    'anime':'UNICAMENTE series de anime japones con animacion japonesa (ejemplos: Naruto, Attack on Titan, Demon Slayer, One Piece) - NO live action, NO series occidentales, NO peliculas',
    'pelianime':'UNICAMENTE peliculas de anime japones (ejemplos: Spirited Away, Your Name, Demon Slayer Movie, Dragon Ball Super Broly) - NO series, NO live action, NO animacion occidental',
    'kdrama':'UNICAMENTE dramas coreanos (ejemplos: Crash Landing on You, Goblin, Squid Game) - NO anime, NO series occidentales',
    'libro':'UNICAMENTE novelas de ficcion o no ficcion (ejemplos: Harry Potter, El Senor de los Anillos, Dune) - ABSOLUTAMENTE NO manga, NO comics, NO novelas graficas, NO webtoons',
    'all':`variedad equilibrada de tipos (el usuario tiene muchos ${dominantType} asi que incluye otros tipos tambien)`
  };
  const typeHint=typeDescriptions[typeFilter]||typeFilter;

  const seed=Math.floor(Math.random()*99999);
  const eras=['clasicos 90s-2000s','estrenos 2022-2024','joyas poco conocidas pero muy buenas','mezcla de epocas'];
  const genres=['accion/aventura','drama/suspenso','comedia','ciencia ficcion/fantasia','romance','terror/misterio','slice of life'];
  const randomEra=eras[seed%eras.length];
  const randomGenre=genres[Math.floor(seed/7)%genres.length];

  const prompt=`[SEED:${seed}] Lista del usuario: ${listStr}

Recomienda 6 titulos de ${typeHint}. REGLAS ESTRICTAS:
1. Mood: ${currentMood?moodMap[currentMood]:'libre - maximo variedad'}
2. Era esta vez: ${randomEra}
3. Genero destacado esta vez: ${randomGenre}
4. Prioriza continuaciones/temporadas de titulos ya en la lista
5. PROHIBIDO incluir cualquier titulo de esta lista (ni parecidos): ${exclude||'ninguno'}
6. Calidad: IMDB 6.5+ o muy popular/trending 2023-2024
7. Los 6 titulos DEBEN ser de generos distintos entre si
8. Incluye al menos 1 titulo trending o viral reciente
9. Disponibles con subtitulos espanol en Netflix/HBO/Disney+/Amazon/Crunchyroll
10. Solo novelas de ficcion para libros, NO manga
11. Usa el titulo mas conocido en Latinoamerica

SOLO JSON array, sin texto extra, exactamente 6 items:
[{"title":"Titulo","titleEn":"English/romaji","type":"anime","reason":"Por que max 10 palabras","platform":"Netflix","score":"8.2/10","detail":"2 oraciones"}]`;

  try{
    let text='', attempts=0;
    while(attempts<3 && !text){
      attempts++;
      try{
        const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{
          method:'POST',
          headers:{'Content-Type':'application/json','Authorization':'Bearer '+GROQ_KEY},
          body:JSON.stringify({
            model:'llama-3.1-8b-instant',
            messages:[
              {role:'system',content:'You are a JSON-only recommendation engine. Output ONLY a valid JSON array. No markdown, no explanation, no text before or after the array.'},
              {role:'user',content:prompt}
            ],
            temperature:0.9,max_tokens:1000,

          })
        });
        if(r.status===429)throw new Error('429');
        const d=await r.json();
        const raw=d.choices?.[0]?.message?.content||'';
        // extract array from response
        const m=raw.match(/\[[\s\S]*?\]/);
        if(m) text=m[0];
      }catch(e){if(String(e).includes('429'))throw e; loading.innerHTML='<span class="rec-loading-dots">Reintentando</span> ('+attempts+'/3)'; await new Promise(res=>setTimeout(res,500));}
    }
    if(!text)throw new Error('no json');
    const clean=text;
    const validTypes=new Set(['serie','pelicula','anime','pelianime','kdrama','libro']);
    const typeMap={'movie':'pelicula','film':'pelicula','tv':'serie','series':'serie','k-drama':'kdrama','korean drama':'kdrama','anime movie':'pelianime','animated film':'pelianime','novel':'libro','book':'libro'};
    // Parse and filter out items already in list (compare normalized ES+EN titles)
    const listNorm=all.map(i=>normalizeTitle(i.title));
    const recs=JSON.parse(clean).map(r=>{
      const t=(r.type||'').toLowerCase().trim();
      r.type=validTypes.has(t)?t:(typeMap[t]||'serie');
      // force type if filter is specific
      if(typeFilter!=='all') r.type=typeFilter;
      return r;
    }).filter(r=>{
      const normEs=normalizeTitle(r.title);
      const normEn=normalizeTitle(r.titleEn||'');
      return!listNorm.some(l=>l===normEs||l===normEn||(normEn&&l.includes(normEn))||(normEs&&l.includes(normEs)));
    });

    sessionShownRecs=[...new Set([...sessionShownRecs,...recs.map(r=>r.title)])];
        recHistory=[...new Set([...recHistory,...recs.map(r=>r.title)])].slice(-50);
    localStorage.setItem('recHistory',JSON.stringify(recHistory));
    loading.classList.remove('show');
    renderRecs(recs);
    document.getElementById('recTimestamp').textContent='Hace un momento';
  }catch(e){
    loading.classList.remove('show');
    if(String(e).includes('429'))showToast('Limite alcanzado, espera 30s');
    else showToast('Error, intenta de nuevo');
  }
  btn.disabled=false;btn.textContent='Recomendar';
}

const recTypeEmoji={serie:'📺',pelicula:'🎬',anime:'⚡',pelianime:'🎌',libro:'📖',kdrama:'🌸'};

function addRecToList(title,type,btnEl){
  const listNorm=Object.values(items).map(i=>normalizeTitle(i.title));
  if(listNorm.includes(normalizeTitle(title))){showToast('Ya esta en tu lista');return;}
  const id=Date.now().toString();
  ref.child(id).set({id,title,type,total:null,ep:0,min:0,status:'pending',addedBy:myName||'Anon',ts:id,stars:0,note:'',doneDate:null,history:[]});
  fetchPoster(title,type);
  showToast('Agregado a pendientes');
  if(btnEl){btnEl.textContent='En lista';btnEl.classList.add('added');btnEl.disabled=true;}
  // switch to list tab after short delay
  setTimeout(()=>switchTab('list'),800);
}

function voteRec(title,vote,cardEl){
  if(vote===-1){
    disliked=[...disliked,title].slice(-30);
    localStorage.setItem('recDisliked',JSON.stringify(disliked));
    showToast('No te gusto, no lo recomendaremos');
    // replace this card with a new recommendation
    const card=cardEl.closest('.rec-card');
    if(card){
      card.style.opacity='0';card.style.transition='opacity .3s';
      setTimeout(()=>card.remove(),300);
    }
    getOneMoreRec(title);
  } else {
    showToast('Genial! Lo tendremos en cuenta');
  }
}

async function getOneMoreRec(excludeTitle){
  const all=Object.values(items);
  if(all.length<1)return;
  const listStr=all.map(i=>i.title).join(', ');
  const currentRecs=Array.from(document.querySelectorAll('.rec-name')).map(el=>el.textContent);
  const allExclude=[...recHistory,...disliked,...all.map(i=>i.title),...currentRecs].join(', ');
  const prompt=`Lista: ${listStr}. Recomienda 1 titulo que NO sea ninguno de estos: ${allExclude}. Solo titulos populares con IMDB 7.5+. SOLO JSON: [{"title":"Titulo","titleEn":"English title","type":"anime","reason":"Razon corta","platform":"Netflix","score":"8.5/10","detail":"Descripcion"}]`;
  try{
    const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+GROQ_KEY},
      body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:[{role:'system',content:'Respond with valid JSON array only.'},{role:'user',content:prompt}],temperature:0.9,max_tokens:300})
    });
    const d=await r.json();
    const text=d.choices?.[0]?.message?.content||'';
    const clean=text.replace(/```json|```/g,'').trim();
    const recs=JSON.parse(clean);
    if(recs.length){
      const grid=document.getElementById('recGrid');
      const newCard=document.createElement('div');
      newCard.style.opacity='0';grid.appendChild(newCard);
      renderOneRec(recs[0],newCard);
      setTimeout(()=>{newCard.style.opacity='1';newCard.style.transition='opacity .3s';},50);
    }
  }catch(e){}
}

function renderOneRec(r,container){
  const inList=Object.values(items).some(it=>normalizeTitle(it.title)===normalizeTitle(r.title));
  const safetitle=(r.title||'').replace(/'/g,"\\'").replace(/"/g,'&quot;');
  const safereason=(r.reason||'').replace(/'/g,"\\'");
  const rtype=r.type&&recTypeEmoji[r.type]?r.type:'serie';
  const poster=recPosters[r.title]||generateCanvasPoster(r.title,rtype);
  container.className='rec-card';
  container.innerHTML=`
    <div class="rec-poster-wrap">
      <img class="rec-poster" src="${poster}" loading="lazy" onerror="this.src='${generateCanvasPoster(r.title,rtype)}'">
      <span class="rec-badge ${rtype}">${recTypeEmoji[rtype]} ${rtype}</span>
    </div>
    <div class="rec-info">
      <div class="rec-name">${r.title||''}</div>
      <div class="rec-meta">
        ${r.score?`<span class="rec-score">★ ${r.score}</span>`:''}
        ${r.platform?`<span class="rec-platform">${r.platform}</span>`:''}
      </div>
      <div class="rec-reason">${r.reason||''}</div>
      ${r.detail?`<div class="rec-why-text" id="rec-detail-new">${r.detail}</div>`:''}
      <div class="rec-actions">
        <button class="rec-add-btn ${inList?'added':''}" onclick="addRecToList('${safetitle}','${rtype}',this)" ${inList?'disabled':''}>${inList?'En lista':'+ Agregar'}</button>
        <div class="rec-vote">
          <button onclick="voteRec('${safetitle}',1,this)">+1</button>
          <button onclick="voteRec('${safetitle}',-1,this)">-1</button>
          <button class="rec-wa-btn" onclick="shareRec(this)" data-title="${safetitle}" data-reason="${safereason}" data-type="${rtype}" data-platform="${r.platform||''}" data-score="${r.score||''}">WA</button>
        </div>
      </div>
    </div>`;
  fetchRecPoster(r.title,rtype,r.titleEn).then(p=>{
    if(p){const img=container.querySelector('.rec-poster');if(img)img.src=p;}
  });
}

function toggleDetail(i){const el=document.getElementById('rec-detail-'+i);if(el)el.classList.toggle('show');}

async function shortenUrl(url){
  try{
    const r=await fetch('https://tinyurl.com/api-create.php?url='+encodeURIComponent(url));
    if(r.ok) return await r.text();
  }catch(e){}
  return url;
}

async function shareRec(btn){
  const title=btn.dataset.title||'';
  const reason=btn.dataset.reason||'';
  const type=btn.dataset.type||'serie';
  const platform=btn.dataset.platform||'';
  const score=btn.dataset.score||'';
  const base='https://bitefren.github.io/watchlist/share.html';
  const params=new URLSearchParams({id:Date.now(),type:'rec',title,t:type,reason,platform,score});
  const longLink=base+'?'+params.toString();
  const link=await shortenUrl(longLink);
  const text='Te recomiendo: *'+title+'*\n_'+reason+'_\n\n'+link;
  window.open('https://wa.me/?text='+encodeURIComponent(text),'_blank');
}

function renderRecs(recs){
  const grid=document.getElementById('recGrid');
  grid.innerHTML=recs.map((r,i)=>{
    const inList=Object.values(items).some(it=>normalizeTitle(it.title)===normalizeTitle(r.title));
    const safetitle=(r.title||'').replace(/'/g,"\\'").replace(/"/g,'&quot;');
    const safereason=(r.reason||'').replace(/'/g,"\\'");
    const rtype=r.type&&recTypeEmoji[r.type]?r.type:'serie';
    const initPoster=generateCanvasPoster(r.title||'',rtype);
    return`<div class="rec-card" id="rec-${i}">
      <div class="rec-poster-wrap">
        <img class="rec-poster" id="rec-img-${i}" src="${initPoster}" loading="lazy" onerror="this.src='${initPoster}'">
        <span class="rec-badge ${rtype}">${recTypeEmoji[rtype]} ${rtype}</span>
      </div>
      <div class="rec-info">
        <div class="rec-name">${r.title||''}</div>
        <div class="rec-meta">
          ${r.score?`<span class="rec-score">★ ${r.score}</span>`:''}
          ${r.platform?`<span class="rec-platform">${r.platform}</span>`:''}
        </div>
        <div class="rec-reason">${r.reason||''}</div>
        ${r.detail?`<div class="rec-why-text" id="rec-detail-${i}">${r.detail}</div>`:''}
        <div class="rec-actions">
          <button class="rec-add-btn ${inList?'added':''}" id="rec-add-${i}" onclick="addRecToList('${safetitle}','${rtype}',this)" ${inList?'disabled':''}>${inList?'En lista':'+ Agregar'}</button>
          <div class="rec-vote">
            <button onclick="voteRec('${safetitle}',1,this)">+1</button>
            <button onclick="voteRec('${safetitle}',-1,this)">-1</button>
            <button class="rec-wa-btn" onclick="shareRec(this)" data-title="${safetitle}" data-reason="${safereason}" data-type="${rtype}" data-platform="${r.platform||''}" data-score="${r.score||''}">WA</button>
            ${r.detail?`<button onclick="toggleDetail(${i})">...</button>`:''}
          </div>
        </div>
      </div>
    </div>`;
  }).join('');

  // fetch real posters and replace canvas
  recs.forEach((r,i)=>{
    fetchRecPoster(r.title,r.type,r.titleEn).then(poster=>{
      if(poster){const img=document.getElementById('rec-img-'+i);if(img)img.src=poster;}
    });
  });
}
