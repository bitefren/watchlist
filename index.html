<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Watchlist</title>
<link href="https://fonts.googleapis.com/css2?family=Philosopher:ital,wght@0,400;0,700;1,400&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d070f;--glass:rgba(255,192,203,0.05);--glass-border:rgba(255,150,180,0.12);
  --glass-hover:rgba(255,150,180,0.08);--accent:#f472b6;--accent2:#e879a0;
  --gold:#fbbf24;--teal:#f9a8d4;--text:#fce7f3;--muted:#9d6b7e;
}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;position:relative}
#bg-scene{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
#bg-scene svg{width:100%;height:100%}
.star{animation:twinkle 3s infinite alternate}
@keyframes twinkle{0%{opacity:.15}100%{opacity:.55}}
#app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:2rem 1.25rem 4rem}
header{text-align:center;margin-bottom:2rem;animation:fadeDown .6s ease both}
@keyframes fadeDown{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:none}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
header h1{font-family:'Philosopher',serif;font-size:clamp(46px,8vw,72px);font-weight:700;font-style:italic;background:linear-gradient(135deg,#fce7f3,#f472b6,#ec4899,#f9a8d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:.04em}
.who-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--glass);border:1px solid var(--glass-border);border-radius:14px;padding:10px 16px;margin-bottom:1.25rem;backdrop-filter:blur(12px);animation:fadeUp .5s .1s ease both}
.who-bar span{font-size:13px;color:var(--muted)}
#nameDisplay{font-size:13px;color:#f472b6;font-weight:600}
.add-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;animation:fadeUp .5s .15s ease both;position:relative;z-index:50}
.add-bar input,.add-bar select{padding:10px 12px;background:var(--glass);border:1px solid var(--glass-border);border-radius:10px;color:var(--text);font-size:15px;font-family:'Nunito',sans-serif;backdrop-filter:blur(8px);transition:border-color .2s}
.add-bar input:focus,.add-bar select:focus{outline:none;border-color:var(--accent)}
.add-bar select option{background:#1a1a2e}
.add-bar .title-inp{flex:1;min-width:160px}
.add-bar .type-sel{width:125px}
.btn-add{padding:10px 20px;background:linear-gradient(135deg,#ec4899,#f472b6);border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:600;font-family:'Nunito',sans-serif;cursor:pointer;white-space:nowrap;transition:opacity .2s,transform .1s}
.btn-add:hover{opacity:.85}
.btn-add:active{transform:scale(.97)}
.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:1rem;animation:fadeUp .5s .18s ease both;position:relative;z-index:10}
.sort-sel{padding:6px 10px;background:#0d070f !important;border:1px solid var(--glass-border);border-radius:8px;color:var(--text) !important;font-size:13px;font-family:'Nunito',sans-serif;-webkit-appearance:none;appearance:none}
.sort-sel option{background:#1a1a2e}
.btn-surprise{padding:6px 14px;background:linear-gradient(135deg,rgba(244,114,182,.2),rgba(249,168,212,.2));border:1px solid rgba(244,114,182,.4);border-radius:8px;color:var(--accent);font-size:13px;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .2s}
.btn-surprise:hover{opacity:.8}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem;animation:fadeUp .5s .2s ease both;position:relative;z-index:10}
.fbtn{padding:5px 14px;border:1px solid var(--glass-border);border-radius:20px;background:#0d070f !important;color:var(--muted);font-size:13px;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .15s}
.fbtn:hover{color:var(--text);border-color:rgba(255,255,255,.2)}
.fbtn.active{background:rgba(244,114,182,.15);border-color:var(--accent);color:var(--accent)}
.stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:1.25rem;animation:fadeUp .5s .22s ease both}
.stat{flex:1;min-width:80px;background:var(--glass);border:1px solid var(--glass-border);border-radius:12px;padding:10px 14px;text-align:center;backdrop-filter:blur(10px)}
.stat-n{font-size:28px;font-weight:700;color:#fff;font-family:'Philosopher',serif}
.stat-l{font-size:13px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}
.card{background:var(--glass);border:1px solid var(--glass-border);border-radius:16px;margin-bottom:10px;display:flex;align-items:flex-start;gap:0;backdrop-filter:blur(14px);transition:border-color .2s,background .2s,transform .15s;animation:fadeUp .4s ease both;overflow:hidden}
.card:hover{border-color:rgba(255,255,255,.13);background:var(--glass-hover);transform:translateY(-1px)}
.card.done{opacity:.5}
.card.highlighted{border-color:#f472b6;box-shadow:0 0 18px rgba(244,114,182,.2)}
/* poster */
.card-poster{width:80px;min-width:80px;height:110px;object-fit:cover;display:block}
.card-poster-placeholder{width:80px;min-width:80px;height:110px;background:rgba(255,255,255,.03);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
.card-body{flex:1;min-width:0;padding:12px 14px;display:flex;gap:10px;align-items:flex-start}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:6px}
.dot-pending{background:var(--muted)}
.dot-watching{background:#f472b6;box-shadow:0 0 8px rgba(244,114,182,.6)}
.dot-done{background:#f9a8d4;box-shadow:0 0 8px rgba(249,168,212,.5)}
.card-info{flex:1;min-width:0}
.card-title{font-family:'Philosopher',serif;font-size:19px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:5px}
.badge{font-size:12px;padding:3px 9px;border-radius:8px;font-weight:600;font-family:'Nunito',sans-serif;letter-spacing:.04em;text-transform:uppercase}
.badge.serie{background:rgba(244,114,182,.15);color:#f472b6;border:1px solid rgba(244,114,182,.3)}
.badge.pelicula{background:rgba(251,191,36,.12);color:#fbbf24;border:1px solid rgba(251,191,36,.25)}
.badge.anime{background:rgba(236,72,153,.12);color:#ec4899;border:1px solid rgba(236,72,153,.25)}
.badge.libro{background:rgba(249,168,212,.12);color:#f9a8d4;border:1px solid rgba(249,168,212,.3)}
.badge.kdrama{background:rgba(251,113,133,.12);color:#fb7185;border:1px solid rgba(251,113,133,.3)}
.badge.pelianime{background:rgba(99,102,241,.12);color:#818cf8;border:1px solid rgba(99,102,241,.3)}
.card-meta{font-size:13px;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap;margin-bottom:7px;align-items:center}
.done-date{color:rgba(249,168,212,.6);font-size:12px}
.stars-display{display:flex;gap:2px;margin-bottom:6px}
.star-icon{font-size:16px;cursor:pointer;transition:transform .1s;opacity:.25;color:var(--gold)}
.star-icon.lit{opacity:1}
.star-icon:hover{transform:scale(1.2);opacity:.8}
.progress-bar{height:3px;background:rgba(255,255,255,.07);border-radius:2px;margin-bottom:8px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#ec4899,#f9a8d4);border-radius:2px;transition:width .4s ease}
.card-actions{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.btn-sm{padding:3px 11px;font-size:13px;font-family:'Nunito',sans-serif;border:1px solid var(--glass-border);border-radius:7px;background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
.btn-sm:hover{background:rgba(255,255,255,.07);color:var(--text)}
.btn-sm.blue{border-color:rgba(244,114,182,.4);color:var(--accent)}
.btn-sm.blue:hover{background:rgba(244,114,182,.12)}
.btn-sm.green{border-color:rgba(249,168,212,.4);color:#f9a8d4}
.btn-sm.green:hover{background:rgba(249,168,212,.1)}
.btn-sm.red{border-color:rgba(248,113,113,.3);color:#f87171}
.btn-sm.red:hover{background:rgba(248,113,113,.1)}
.progress-fields{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:8px}
.pf-group{display:flex;align-items:center;gap:6px}
.pf-group label{font-size:13px;color:var(--muted)}
.pf-group input{width:68px;padding:3px 8px;background:rgba(255,255,255,.04);border:1px solid var(--glass-border);border-radius:7px;color:var(--text);font-size:13px;font-family:'Nunito',sans-serif}
.pf-group input:focus{outline:none;border-color:var(--accent)}
.pf-group span{font-size:13px;color:var(--muted)}
.note-field{width:100%;padding:5px 10px;background:rgba(255,255,255,.03);border:1px solid var(--glass-border);border-radius:8px;color:var(--text);font-size:13px;font-family:'Nunito',sans-serif;resize:none;height:32px;margin-bottom:2px}
.note-field:focus{outline:none;border-color:var(--accent);height:64px}
.note-display{font-size:13px;color:rgba(249,168,212,.4);font-style:italic;margin-bottom:6px}
.empty{text-align:center;color:var(--muted);font-size:15px;padding:4rem 0}
.sync{font-size:11px;color:var(--muted);text-align:right;margin-bottom:.75rem}
.sync.ok{color:rgba(45,212,251,.6)}
.sync.err{color:rgba(248,113,113,.6)}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(236,72,153,.2);border:1px solid rgba(244,114,182,.4);color:#fce7f3;padding:10px 22px;border-radius:12px;font-size:14px;font-family:'Nunito',sans-serif;backdrop-filter:blur(12px);opacity:0;transition:all .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.autocomplete-wrap{position:relative;flex:1;min-width:160px;z-index:9999}
.autocomplete-wrap input{width:100%}
.suggestions{position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:9999;background:#1a0d14;border:1px solid rgba(244,114,182,.3);border-radius:10px;overflow:hidden;max-height:260px;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.6)}
.sug-item{display:flex;align-items:center;gap:10px;padding:8px 12px;cursor:pointer;transition:background .15s}
.sug-item:hover{background:rgba(244,114,182,.12)}
.sug-img{width:36px;height:52px;object-fit:cover;border-radius:4px;flex-shrink:0;background:rgba(255,255,255,.05)}
.sug-img-placeholder{width:36px;height:52px;border-radius:4px;background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sug-info{flex:1;min-width:0}
.sug-title{font-size:14px;color:#fff;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sug-year{font-size:12px;color:var(--muted)}


.main-tabs{display:flex;gap:4px;margin-bottom:1.25rem;background:var(--glass);border:1px solid var(--glass-border);border-radius:12px;padding:4px;animation:fadeUp .5s .17s ease both}
.main-tab{flex:1;padding:8px 16px;border:none;border-radius:9px;background:transparent;color:var(--muted);font-size:14px;font-weight:600;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .2s}
.main-tab.active{background:linear-gradient(135deg,#ec4899,#f472b6);color:#fff}
.main-tab:hover:not(.active){color:var(--text);background:rgba(255,150,180,.08)}
/* ── RECOMMENDATIONS ── */
.rec-header{display:flex;align-items:center;margin-bottom:1rem}
.rec-title{font-family:'Philosopher',serif;font-size:26px;font-weight:700;font-style:italic;background:linear-gradient(135deg,#fce7f3,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
/* mood */
.mood-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.mood-btn{all:unset;box-sizing:border-box;padding:6px 14px;border:1px solid rgba(244,114,182,.2);border-radius:20px;background:#130a10;color:#9d6b7e;font-size:13px;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .2s;white-space:nowrap}
.mood-btn:hover{border-color:rgba(244,114,182,.5);color:#f9a8d4;background:#1f0d18}
.mood-btn.active{background:rgba(244,114,182,.18);border-color:#f472b6;color:#f472b6;font-weight:600}
/* controls */
.rec-controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:1.5rem}
.btn-rec{all:unset;box-sizing:border-box;padding:9px 20px;background:linear-gradient(135deg,#ec4899,#f472b6);border-radius:10px;color:#fff;font-size:14px;font-weight:600;font-family:'Nunito',sans-serif;cursor:pointer;transition:opacity .2s;white-space:nowrap}
.btn-rec:hover{opacity:.85}
.btn-rec:disabled{opacity:.45;cursor:not-allowed}
.btn-rec-outline{all:unset;box-sizing:border-box;padding:9px 16px;background:#130a10;border:1px solid rgba(244,114,182,.35);border-radius:10px;color:#f472b6;font-size:14px;font-weight:600;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-rec-outline:hover{background:rgba(244,114,182,.1)}
/* grid */
.rec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:16px}
.rec-card{background:rgba(255,182,208,.03);border:1px solid rgba(244,114,182,.1);border-radius:14px;overflow:hidden;transition:transform .2s,border-color .25s,box-shadow .25s;display:flex;flex-direction:column}
.rec-card:hover{transform:translateY(-5px);border-color:rgba(244,114,182,.4);box-shadow:0 8px 30px rgba(244,114,182,.12)}
/* poster */
.rec-poster-wrap{position:relative;aspect-ratio:2/3;overflow:hidden;background:#130a10;flex-shrink:0}
.rec-poster{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
.rec-card:hover .rec-poster{transform:scale(1.04)}
.rec-poster-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:38px;background:linear-gradient(160deg,#1a0a14,#0d070f)}
.rec-badge{position:absolute;top:8px;left:8px;font-size:10px;padding:3px 8px;border-radius:6px;font-weight:700;font-family:'Nunito',sans-serif;text-transform:uppercase;letter-spacing:.05em;backdrop-filter:blur(8px)}
.rec-badge.serie{background:rgba(244,114,182,.85);color:#fff}
.rec-badge.pelicula{background:rgba(251,191,36,.9);color:#1a0a00}
.rec-badge.anime{background:rgba(236,72,153,.85);color:#fff}
.rec-badge.pelianime{background:rgba(99,102,241,.85);color:#fff}
.rec-badge.kdrama{background:rgba(251,113,133,.85);color:#fff}
.rec-badge.libro{background:rgba(249,168,212,.9);color:#1a0a14}
/* info */
.rec-info{padding:10px 12px 12px;flex:1;display:flex;flex-direction:column;gap:4px}
.rec-name{font-family:'Philosopher',serif;font-size:14px;font-weight:700;color:#fce7f3;line-height:1.3}
.rec-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.rec-score{font-size:12px;color:#fbbf24;font-weight:600}
.rec-platform{font-size:11px;color:rgba(244,114,182,.75);font-weight:500}
.rec-reason{font-size:12px;color:#9d6b7e;line-height:1.4;flex:1}
.rec-why-text{font-size:12px;color:rgba(249,168,212,.55);line-height:1.5;font-style:italic;margin-top:2px;display:none}
.rec-why-text.show{display:block}
/* actions */
.rec-actions{margin-top:8px;display:flex;flex-direction:column;gap:6px}
.rec-add-btn{all:unset;box-sizing:border-box;width:100%;padding:8px;text-align:center;background:linear-gradient(135deg,#ec4899,#f472b6);border-radius:8px;color:#fff;font-size:13px;font-weight:600;font-family:'Nunito',sans-serif;cursor:pointer;transition:opacity .15s}
.rec-add-btn:hover{opacity:.85}
.rec-add-btn.added{background:#1f0d18;border:1px solid rgba(249,168,212,.3);color:#f9a8d4;cursor:default}
.rec-vote{display:flex;gap:5px}
.rec-vote button{all:unset;box-sizing:border-box;flex:1;padding:6px 4px;text-align:center;background:#130a10;border:1px solid rgba(244,114,182,.18);border-radius:7px;color:#9d6b7e;font-size:11px;font-weight:600;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .15s}
.rec-vote button:hover{background:#1f0d18;border-color:rgba(244,114,182,.4);color:#f9a8d4}
/* loading */
.rec-loading{text-align:center;color:var(--muted);font-size:14px;padding:3rem;display:none}
.rec-loading.show{display:block}
.rec-loading-dots::after{content:'.';animation:dots 1.2s infinite}
@keyframes dots{0%{content:'.'}33%{content:'..'}66%{content:'...'}}


::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}
@media(max-width:600px){
  .add-bar{flex-direction:column}
  .add-bar .type-sel{width:100%}
  .toolbar{flex-direction:column;align-items:flex-start}
  .btn-surprise,.sort-sel{width:100%}
  .card-poster,.card-poster-placeholder{width:64px;min-width:64px;height:90px}
  .card-poster-placeholder{font-size:22px}
}
</style>
</head>
<body>

<div id="bg-scene">
<svg viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="g1" cx="20%" cy="20%"><stop offset="0%" stop-color="#f472b6" stop-opacity=".22"/><stop offset="100%" stop-color="transparent"/></radialGradient>
    <radialGradient id="g2" cx="80%" cy="80%"><stop offset="0%" stop-color="#ec4899" stop-opacity=".16"/><stop offset="100%" stop-color="transparent"/></radialGradient>
    <radialGradient id="g3" cx="50%" cy="50%"><stop offset="0%" stop-color="#f9a8d4" stop-opacity=".12"/><stop offset="100%" stop-color="transparent"/></radialGradient>
  </defs>
  <rect width="1440" height="900" fill="#0d070f"/>
  <ellipse cx="200" cy="200" rx="500" ry="400" fill="url(#g1)"/>
  <ellipse cx="1300" cy="750" rx="450" ry="350" fill="url(#g2)"/>
  <ellipse cx="720" cy="450" rx="300" ry="300" fill="url(#g3)"/>
  <g fill="#fff">
    <circle class="star" cx="120" cy="80" r="1" style="animation-delay:0s"/>
    <circle class="star" cx="340" cy="150" r="1.2" style="animation-delay:.5s"/>
    <circle class="star" cx="600" cy="60" r=".8" style="animation-delay:1s"/>
    <circle class="star" cx="900" cy="120" r="1.1" style="animation-delay:1.5s"/>
    <circle class="star" cx="1100" cy="80" r=".9" style="animation-delay:.8s"/>
    <circle class="star" cx="1300" cy="200" r="1.3" style="animation-delay:.3s"/>
    <circle class="star" cx="80" cy="400" r=".7" style="animation-delay:2s"/>
    <circle class="star" cx="1400" cy="350" r="1" style="animation-delay:1.2s"/>
    <circle class="star" cx="500" cy="700" r=".9" style="animation-delay:.6s"/>
    <circle class="star" cx="1200" cy="600" r="1.1" style="animation-delay:1.8s"/>
    <circle class="star" cx="760" cy="800" r=".8" style="animation-delay:.4s"/>
    <circle class="star" cx="200" cy="750" r="1" style="animation-delay:2.2s"/>
    <circle class="star" cx="460" cy="300" r=".9" style="animation-delay:1.1s"/>
    <circle class="star" cx="1050" cy="450" r=".7" style="animation-delay:2.5s"/>
  </g>
  <g opacity=".045" transform="translate(40,280) rotate(-10)">
    <rect x="0" y="0" width="190" height="130" rx="4" fill="none" stroke="#f472b6" stroke-width="1.5"/>
    <rect x="-10" y="15" width="8" height="14" rx="2" fill="#f472b6"/><rect x="-10" y="40" width="8" height="14" rx="2" fill="#f472b6"/><rect x="-10" y="65" width="8" height="14" rx="2" fill="#f472b6"/><rect x="-10" y="90" width="8" height="14" rx="2" fill="#f472b6"/>
    <rect x="192" y="15" width="8" height="14" rx="2" fill="#f472b6"/><rect x="192" y="40" width="8" height="14" rx="2" fill="#f472b6"/><rect x="192" y="65" width="8" height="14" rx="2" fill="#f472b6"/><rect x="192" y="90" width="8" height="14" rx="2" fill="#f472b6"/>
    <rect x="12" y="12" width="50" height="46" rx="2" fill="#f472b6" opacity=".3"/><rect x="70" y="12" width="50" height="46" rx="2" fill="#e879a0" opacity=".25"/><rect x="128" y="12" width="50" height="46" rx="2" fill="#7dd3fc" opacity=".2"/>
    <rect x="12" y="66" width="50" height="46" rx="2" fill="#e879a0" opacity=".2"/><rect x="70" y="66" width="50" height="46" rx="2" fill="#f472b6" opacity=".25"/><rect x="128" y="66" width="50" height="46" rx="2" fill="#2dd4bf" opacity=".2"/>
  </g>

// TMDB poster fetch (free, no key needed via image search fallback)
const posterCache={};
async function fetchPoster(title,type){
  if(posterCache[title]!==undefined) return posterCache[title];
  posterCache[title]=null;
  try{
    const q=encodeURIComponent(title);
    if(type==='libro'){
      const r=await fetch(`https://openlibrary.org/search.json?title=${q}&limit=1&fields=cover_i`);
      const d=await r.json();
      const coverId=d.docs?.[0]?.cover_i;
      if(coverId){
        posterCache[title]=`https://covers.openlibrary.org/b/id/${coverId}-M.jpg`;
        render();
      }
    } else {
      const endpoints2=(type==='pelicula'||type==='pelianime')?['movie']:
                       (type==='anime')?['tv','movie']:['tv','movie'];
      let poster2=null;
      for(const mt of endpoints2){
        if(poster2) break;
        try{
          const r=await fetch(`https://api.themoviedb.org/3/search/${mt}?api_key=648178e349ec83cbabf8e5f055a8fd8b&query=${q}&language=en-US`);
          const d=await r.json();
          poster2=d.results?.[0]?.poster_path||null;
        }catch(e){}
      }
      if(!poster2){
        try{
          const r=await fetch(`https://api.themoviedb.org/3/search/multi?api_key=648178e349ec83cbabf8e5f055a8fd8b&query=${q}&language=en-US`);
          const d=await r.json();
          poster2=(d.results||[]).find(x=>x.poster_path)?.poster_path||null;
        }catch(e){}
      }
      if(poster2){
        posterCache[title]='https://image.tmdb.org/t/p/w92'+poster2;
        render();
      } else {
        try{
          const entity=(type==='pelicula'||type==='pelianime')?'movie':'tvSeason';
          const ir=await fetch(`https://itunes.apple.com/search?term=${q}&entity=${entity}&limit=1`);
          const id=await ir.json();
          const art=id.results?.[0]?.artworkUrl100;
          if(art){posterCache[title]=art.replace('100x100','300x300');render();}
        }catch(e2){}
      }
    }
  }catch(e){}
  return posterCache[title]||null;
}

function addItem(){
  const title=document.getElementById('newTitle').value.trim();
  if(!title){showToast('Escribe un título primero');return;}
  const id=Date.now().toString();
  const type=document.getElementById('newType').value;
  ref.child(id).set({id,title,type,total:null,ep:0,min:0,status:'pending',addedBy:myName||'Anon',ts:id,stars:0,note:'',doneDate:null});
  document.getElementById('newTitle').value='';
  fetchPoster(title,type);
}

function deleteItem(id){
  if(!confirm('¿Eliminar?'))return;
  ref.child(id).remove();
}

function setStatus(id,status){
  const upd={status};
  if(status==='done'){
    const item=items[id];
    if(item?.total){upd.ep=item.total;upd.min=0;}
    upd.doneDate=new Date().toLocaleDateString('es',{day:'numeric',month:'short',year:'numeric'});
  }
  if(status==='watching'||status==='pending') upd.doneDate=null;
  ref.child(id).update(upd);
}

function updateEp(id,val){
  const v=parseInt(val)||0;
  const item=items[id]; if(!item)return;
  const upd={ep:v};
  if(item.total&&v>=item.total){upd.status='done';upd.doneDate=new Date().toLocaleDateString('es',{day:'numeric',month:'short',year:'numeric'});}
  else if(v>0||item.min>0) upd.status='watching';
  else upd.status='pending';
  ref.child(id).update(upd);
}


function formatMin(val){
  if(!val) return '';
  const v=parseInt(val)||0;
  const h=Math.floor(v/60);
  const m=v%60;
  if(h>0) return h+':'+(m<10?'0'+m:m);
  return String(v);
}

function parseMin(str){
  if(!str) return 0;
  str=str.trim();
  if(str.includes(':')){
    const parts=str.split(':');
    const h=parseInt(parts[0])||0;
    const m=parseInt(parts[1])||0;
    return h*60+m;
  }
  return parseInt(str)||0;
}
function updateMin(id,val){
  const v=parseMin(val);
  const item=items[id]; if(!item)return;
  const upd={min:v};
  if((item.ep>0||v>0)&&item.status==='pending') upd.status='watching';
  ref.child(id).update(upd);
}

const statusLbl={pending:'Pendiente',watching:'Viendo',done:'Terminado ✓'};
const dotCls={pending:'dot-pending',watching:'dot-watching',done:'dot-done'};
const typeEmoji={serie:'📺',pelicula:'🎬',anime:'⚡',pelianime:'🎌',libro:'📖',kdrama:'🌸'};
function safeType(t){return typeEmoji[t]?t:'serie';}

function progressPct(item){
  if(!item.total)return 0;
  const cur=item.type==='pelicula'?item.min:item.ep;
  return Math.min(100,Math.round((cur/item.total)*100));
}

function progressLabel(item){
  if(item.type==='pelicula') return item.min?`min ${item.min}`:'' ;
  if(item.type==='libro') return item.ep?`pág ${item.ep}`:'';
  let s='';
  if(item.ep) s+=`ep ${item.ep}`;
  if(item.min) s+=(s?' · ':'')+`${formatMin(item.min)}`;
  return s;
}

function starsHTML(id,val){
  return [1,2,3,4,5].map(n=>`<span class="star-icon ${n<=(val||0)?'lit':''}" onclick="setStars('${id}',${n})">★</span>`).join('');
}

function render(){
  const sortVal=document.getElementById('sortSel').value;
  const all=Object.values(items);
  all.sort((a,b)=>{
    if(sortVal==='az') return (a.title||'').localeCompare(b.title||'','es');
    if(sortVal==='stars') return (b.stars||0)-(a.stars||0);
    if(sortVal==='progress') return progressPct(b)-progressPct(a);
    return (b.ts||0)-(a.ts||0);
  });

  let list=all;
  if(filter==='pending') list=all.filter(i=>i.status==='pending');
  else if(filter==='watching') list=all.filter(i=>i.status==='watching');
  else if(filter==='done') list=all.filter(i=>i.status==='done');
  else if(['serie','pelicula','anime','pelianime','libro','kdrama'].includes(filter)) list=all.filter(i=>i.type===filter);

  const done=all.filter(i=>i.status==='done').length;
  const watching=all.filter(i=>i.status==='watching').length;
  const ratedItems=all.filter(i=>(i.stars||0)>0);
  const avgStars=ratedItems.length>0?(ratedItems.reduce((s,i)=>s+(i.stars||0),0)/ratedItems.length).toFixed(1):'-';

  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-n">${all.length}</div><div class="stat-l">Total</div></div>
    <div class="stat"><div class="stat-n">${watching}</div><div class="stat-l">Viendo</div></div>
    <div class="stat"><div class="stat-n">${done}</div><div class="stat-l">Terminados</div></div>
    <div class="stat"><div class="stat-n">${avgStars}</div><div class="stat-l">★ Promedio</div></div>
  `;

  if(!list.length){
    document.getElementById('list').innerHTML='<div class="empty">✨ Nada aquí todavía</div>';
    return;
  }

  // fetch posters for items that don't have one yet
  list.forEach(item=>{ if(posterCache[item.title]===undefined) fetchPoster(item.title,item.type); });

  const isBook=i=>i.type==='libro';
  const isMovie=i=>i.type==='pelicula';

  checkShowRec();
  document.getElementById('list').innerHTML=list.map((item,idx)=>{
    const pct=progressPct(item);
    const progLbl=progressLabel(item);
    const hl=item.id===highlightId;
    const epLabel=isBook(item)?'Página':isMovie(item)?'Minuto':'Episodio';
    const minShow=!isBook(item)&&!isMovie(item);
    const poster=posterCache[item.title];
    const posterHTML=poster
      ?`<img class="card-poster" src="${poster}" alt="${item.title}" loading="lazy" onerror="this.style.display='none'">`
      :`<div class="card-poster-placeholder">${typeEmoji[item.type]||'🎬'}</div>`;

    return `<div class="card ${item.status==='done'?'done':''} ${hl?'highlighted':''}" id="card-${item.id}" style="animation-delay:${idx*.04}s">
      ${posterHTML}
      <div class="card-body">
        <div class="dot ${dotCls[item.status]||'dot-pending'}"></div>
        <div class="card-info">
          <div class="card-title">
            <span>${item.title}</span>
            <span class="badge ${safeType(item.type)}">${typeEmoji[safeType(item.type)]} ${safeType(item.type)}</span>
            ${hl?'<span style="font-size:13px;color:var(--gold)">✨ ¡Esta!</span>':''}
          </div>
          <div class="card-meta">
            <span>${statusLbl[item.status]||item.status}</span>
            ${progLbl?`<span>· ${progLbl}</span>`:''}
            ${item.doneDate?`<span class="done-date">· ✓ ${item.doneDate}</span>`:''}
          </div>
          ${pct>0?`<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`:''}
          <div class="stars-display">${starsHTML(item.id,item.stars)}</div>
          ${item.note?`<div class="note-display">"${item.note}"</div>`:''}
          <div class="card-actions">
            ${item.status==='pending'?`<button class="btn-sm blue" onclick="setStatus('${item.id}','watching')">▶ Empezar</button>`:''} ${item.status==='watching'?`<button class="btn-sm" onclick="setStatus('${item.id}','pending')">↩ Pendiente</button>`:''}
            ${item.status!=='done'?`<button class="btn-sm green" onclick="setStatus('${item.id}','done')">✓ Terminado</button>`:''}
            ${item.status==='done'?`<button class="btn-sm" onclick="setStatus('${item.id}','watching')">↺ Reanudar</button>`:''}
            <button class="btn-sm red" onclick="deleteItem('${item.id}')">✕</button>
          </div>
          <div class="progress-fields">
            <div class="pf-group">
              <label>${epLabel}:</label>
              <input type="number" min="0" value="${isMovie(item)?item.min||0:item.ep||0}"
                onchange="${isMovie(item)?`updateMin('${item.id}',this.value)`:`updateEp('${item.id}',this.value)`}"/>
            </div>
            ${minShow?`<div class="pf-group"><label>Minuto:</label><input type="text" placeholder="00:00" maxlength="5" value="${item.min?formatMin(item.min):''}" onchange="updateMin('${item.id}',this.value)" style="width:72px"/></div>`:''}
          </div>
          <textarea class="note-field" placeholder="Nota o comentario..." onblur="saveNote('${item.id}',this.value)">${item.note||''}</textarea>
        </div>
      </div>
    </div>`;
  }).join('');
}


let sugTimeout=null;
let currentSuggestions=[];

document.addEventListener('DOMContentLoaded',()=>{
  const inp=document.getElementById('newTitle');
  const box=document.getElementById('suggestions');
  
  inp.addEventListener('input',()=>{
    clearTimeout(sugTimeout);
    const q=inp.value.trim();
    if(q.length<2){box.style.display='none';return;}
    sugTimeout=setTimeout(()=>searchSuggestions(q),300);
  });

  inp.addEventListener('keydown',e=>{
    if(e.key==='Escape'){box.style.display='none';}
  });

  document.addEventListener('click',e=>{
    if(!e.target.closest('.autocomplete-wrap')) box.style.display='none';
  });
});

async function searchSuggestions(q){
  const type=document.getElementById('newType').value;
  const box=document.getElementById('suggestions');
  const enc=encodeURIComponent(q);
  let results=[];
  try{
    if(type==='libro'){
      const r=await fetch(`https://openlibrary.org/search.json?title=${enc}&limit=6&fields=title,author_name,first_publish_year,cover_i`);
      const d=await r.json();
      results=(d.docs||[]).map(x=>({
        title:x.title,
        year:x.first_publish_year||'',
        poster:x.cover_i?`https://covers.openlibrary.org/b/id/${x.cover_i}-S.jpg`:null,
        subtitle:x.author_name?.[0]||''
      }));
    } else {
      // search both movie and tv, pick the right one based on type
      const endpoints = type==='pelicula' ? ['movie'] : type==='kdrama' ? ['tv'] : type==='anime' ? ['tv','movie'] : ['tv','movie'];
      let raw=[];
      for(const mt of endpoints){
        try{
          // fetch page 1 and 2 for more results, use en-US to get original titles
          const [r1,r2]=await Promise.all([
            fetch(`https://api.themoviedb.org/3/search/${mt}?api_key=648178e349ec83cbabf8e5f055a8fd8b&query=${enc}&language=en-US&page=1`),
            fetch(`https://api.themoviedb.org/3/search/${mt}?api_key=648178e349ec83cbabf8e5f055a8fd8b&query=${enc}&language=en-US&page=2`)
          ]);
          const [d1,d2]=await Promise.all([r1.json(),r2.json()]);
          const combined=[...(d1.results||[]),...(d2.results||[])];
          raw=raw.concat(combined.map(x=>({
            title:x.title||x.name||x.original_title||x.original_name||'',
            year:(x.release_date||x.first_air_date||'').slice(0,4),
            poster:x.poster_path?'https://image.tmdb.org/t/p/w92'+x.poster_path:null,
            subtitle:'',
            pop:x.popularity||0
          })));
        }catch(e){}
      }
      const seen=new Set();
      raw.sort((a,b)=>b.pop-a.pop);
      raw=raw.filter(x=>x.title&&x.title.trim()!='');
      results=raw.filter(x=>{
        const k=x.title+'|'+x.year;
        if(seen.has(k))return false;
        seen.add(k);return true;
      }).slice(0,10);
    }
  }catch(e){return;}

  currentSuggestions=results;
  if(!results.length){box.style.display='none';return;}
  const typeEmojis={serie:'📺',pelicula:'🎬',anime:'⚡',libro:'📖'};
  const type2=document.getElementById('newType').value;
  box.innerHTML=results.map((r,i)=>`
    <div class="sug-item" onclick="pickSuggestion(${i})">
      ${r.poster
        ?`<img class="sug-img" src="${r.poster}" loading="lazy" onerror="this.style.display='none'">`
        :`<div class="sug-img-placeholder">${typeEmojis[type2]||'🎬'}</div>`}
      <div class="sug-info">
        <div class="sug-title">${r.title}</div>
        <div class="sug-year">${r.subtitle?r.subtitle+' · ':''}${r.year}</div>
      </div>
    </div>`).join('');
  box.style.display='block';
}

function pickSuggestion(i){
  const s=currentSuggestions[i];
  if(!s)return;
  document.getElementById('newTitle').value=s.title;
  document.getElementById('suggestions').style.display='none';
  if(s.poster) posterCache[s.title]=s.poster;
}

document.getElementById('newType')?.addEventListener('change',()=>{
  const q=document.getElementById('newTitle').value.trim();
  if(q.length>=2) searchSuggestions(q);
});

async function getRecommendations(){
  const all=Object.values(items);
  if(all.length<2){showToast('Agrega más títulos primero');return;}

  const btn=document.getElementById('btnRec');
  const loading=document.getElementById('recLoading');
  const grid=document.getElementById('recGrid');

  btn.disabled=true; btn.textContent='...';
  loading.classList.add('show'); grid.innerHTML='';

  const typeFilter=document.getElementById('recTypeFilter').value;

  // Build weighted list — done+stars first
  const sorted=[...all].sort((a,b)=>{
    const wa=(a.status==='done'?2:a.status==='watching'?1:0)+(a.stars||0);
    const wb=(b.status==='done'?2:b.status==='watching'?1:0)+(b.stars||0);
    return wb-wa;
  });
  const listStr=sorted.map(i=>`${i.title}(${i.type}${i.stars?','+i.stars+'★':''}${i.status==='done'?',visto':''})`).join(', ');

  // Count types for variety hint
  const typeCounts={};
  all.forEach(i=>{typeCounts[i.type]=(typeCounts[i.type]||0)+1;});
  const dominantType=Object.entries(typeCounts).sort((a,b)=>b[1]-a[1])[0]?.[0];

  // Mood instructions
  const moodMap={
    surprise:'variedad sorprendente, mezcla géneros',
    light:'ligero, divertido, sin drama intenso',
    intense:'intenso, apasionante, lleno de acción o drama',
    romantic:'romántico, con buena historia de amor',
    continue:'PRIORIZA continuaciones/temporadas siguientes de lo que ya tiene en lista'
  };

  // Already seen/disliked
  const exclude=[...recHistory.slice(-20),...disliked,...all.map(i=>i.title)].join(', ');
  const typeHint=typeFilter==='all'?`variedad (tiene muchos ${dominantType} así que no recomiendes solo eso)`:`principalmente ${typeFilter}`;

  const prompt=`Eres experto en entretenimiento. Lista del usuario: ${listStr}

Recomienda 6 títulos de ${typeHint} con estas reglas ESTRICTAS:
- Mood del usuario hoy: ${moodMap[currentMood]||'sorpréndeme'}
- Si hay continuaciones/temporadas siguientes de títulos en la lista, INCLÚYELAS primero
- NO incluyas estos títulos (ya vistos o rechazados): ${exclude||'ninguno'}
- Solo títulos populares y bien valorados (IMDB 7.5+ o MAL 8+ para anime)
- Solo libros de ficción/novelas, NO manga ni novelas gráficas para tipo "libro"
- Para tipo "pelianime" recomienda SOLO películas de anime (Ghibli, Demon Slayer Movie, One Piece Film, etc)
- Disponibles en Netflix, Crunchyroll, HBO, Disney+, Amazon o con subtítulos español latino
- Usa el título más conocido en Latinoamérica
- Varía los tipos si el filtro es "all"

Responde SOLO JSON sin markdown:
[{"title":"Título","type":"anime","reason":"Por qué le gustará (máx 10 palabras)","platform":"Netflix","score":"8.5/10","detail":"Explicación más detallada en 2 oraciones"}]`;

  try{
    const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+GROQ_KEY},
      body:JSON.stringify({model:'llama-3.1-8b-instant',messages:[{role:'user',content:prompt}],temperature:0.75,max_tokens:900})
    });
    if(r.status===429) throw new Error('429');
    const d=await r.json();
    const text=d.choices?.[0]?.message?.content||'';
    const clean=text.replace(/```json|```/g,'').trim();
    const validTypes=new Set(['serie','pelicula','anime','pelianime','kdrama','libro']);
    // Normalize types from AI
    const typeMap={'movie':'pelicula','film':'pelicula','tv':'serie','television':'serie','series':'serie',
      'k-drama':'kdrama','korean':'kdrama','korean drama':'kdrama','anime movie':'pelianime',
      'animated film':'pelianime','animated movie':'pelianime','novel':'libro','book':'libro'};
    const recs=JSON.parse(clean).map(r=>{
      const t=(r.type||'').toLowerCase().trim();
      r.type=validTypes.has(t)?t:(typeMap[t]||'serie');
      return r;
    });

    // Save to history
    recHistory=[...recHistory,...recs.map(r=>r.title)].slice(-50);
    localStorage.setItem('recHistory',JSON.stringify(recHistory));

    loading.classList.remove('show');
    renderRecs(recs);
  }catch(e){
    loading.classList.remove('show');
    if(String(e).includes('429')) showToast('Límite alcanzado, espera 30s ⏳');
    else showToast('Error al obtener recomendaciones, intenta de nuevo');
  }
  btn.disabled=false; btn.textContent='✦ Recomendar';
}

async function fetchRecPoster(title,type){
  if(recPosters[title]!==undefined) return recPosters[title];
  recPosters[title]=null;
  try{
    const q=encodeURIComponent(title);
    if(type==='libro'){
      const r=await fetch(`https://openlibrary.org/search.json?title=${q}&limit=1&fields=cover_i`);
      const d=await r.json();
      const cid=d.docs?.[0]?.cover_i;
      if(cid) recPosters[title]=`https://covers.openlibrary.org/b/id/${cid}-M.jpg`;
    } else {
      const mt=(type==='pelicula'||type==='pelianime')?'movie':'tv';
      const r=await fetch(`https://api.themoviedb.org/3/search/${mt}?api_key=648178e349ec83cbabf8e5f055a8fd8b&query=${q}&language=en-US`);
      const d=await r.json();
      const poster=d.results?.[0]?.poster_path;
      if(poster) recPosters[title]='https://image.tmdb.org/t/p/w185'+poster;
      else{
        const ir=await fetch(`https://itunes.apple.com/search?term=${q}&entity=${(type==='pelicula'||type==='pelianime')?'movie':'tvSeason'}&limit=1`);
        const id=await ir.json();
        const art=id.results?.[0]?.artworkUrl100;
        if(art) recPosters[title]=art.replace('100x100','300x300');
      }
    }
  }catch(e){}
  return recPosters[title]||null;
}

const recTypeEmoji={serie:'📺',pelicula:'🎬',anime:'⚡',pelianime:'🎌',libro:'📖',kdrama:'🌸'};

function addRecToList(title,type,btnEl){
  const exists=Object.values(items).some(i=>i.title.toLowerCase()===title.toLowerCase());
  if(exists){showToast('Ya está en tu lista');return;}
  const id=Date.now().toString();
  ref.child(id).set({id,title,type,total:null,ep:0,min:0,status:'pending',addedBy:myName||'Anon',ts:id,stars:0,note:'',doneDate:null});
  fetchPoster(title,type);
  showToast('✓ Agregado a pendientes');
  if(btnEl){btnEl.textContent='✓ Agregado';btnEl.classList.add('added');btnEl.disabled=true;}
}

function voteRec(title,vote,el){
  if(vote===-1){
    disliked=[...disliked,title].slice(-30);
    localStorage.setItem('recDisliked',JSON.stringify(disliked));
    showToast('👎 No te gustó, no lo recomendaremos de nuevo');
    el.closest('.rec-card').style.opacity='0.3';
  } else {
    showToast('👍 ¡Genial! Tendremos eso en cuenta');
  }
}

function toggleDetail(id){

function shareRec(title,reason){

  window.open('https://wa.me/?text='+encodeURIComponent(text),'_blank');
}

function renderRecs(recs){
  const grid=document.getElementById('recGrid');
  grid.innerHTML=recs.map((r,i)=>{
    const inList=Object.values(items).some(it=>it.title.toLowerCase()===r.title.toLowerCase());
    const safetitle=r.title.replace(/'/g,"\'").replace(/"/g,'&quot;');
    const safereason=(r.reason||'').replace(/'/g,"\'");
    const rtype=r.type&&recTypeEmoji[r.type]?r.type:'serie';
    return `<div class="rec-card" id="rec-${i}">
      <div class="rec-poster-wrap">
        <div class="rec-poster-ph" id="rec-ph-${i}">${recTypeEmoji[rtype]||'🎬'}</div>
        <span class="rec-badge ${rtype}">${recTypeEmoji[rtype]} ${rtype}</span>
      </div>
      <div class="rec-info">
        <div class="rec-name">${r.title||'Sin título'}</div>
        <div class="rec-meta">
          ${r.score?`<span class="rec-score">★ ${r.score}</span>`:''}
          ${r.platform?`<span class="rec-platform">${r.platform}</span>`:''}
        </div>
        <div class="rec-reason">${r.reason||''}</div>
        ${r.detail?`<div class="rec-why-text" id="rec-detail-${i}">${r.detail}</div>`:''}
        <div class="rec-actions">
          <button class="rec-add-btn ${inList?'added':''}" id="rec-add-${i}" onclick="addRecToList('${safetitle}','${rtype}',this)" ${inList?'disabled':''}>
            ${inList?'✓ En lista':'+ Agregar'}
          </button>
          <div class="rec-vote">
            <button onclick="voteRec('${safetitle}',1,this)" title="Me gusta">+1</button>
            <button onclick="voteRec('${safetitle}',-1,this)" title="No me gusta">−1</button>
            <button onclick="shareRec('${safetitle}','${safereason}')" title="Compartir">WA</button>
            ${r.detail?`<button onclick="toggleDetail(${i})" title="Más info">...</button>`:''}
          </div>
        </div>
      </div>
    </div>`;
  }).join('');

  recs.forEach((r,i)=>{
    fetchRecPoster(r.title,r.type).then(poster=>{
      if(poster){
        const ph=document.getElementById('rec-ph-'+i);
        if(ph) ph.outerHTML=`<img class="rec-poster" src="${poster}" loading="lazy" onerror="this.style.display='none'">`;
      }
    });
  });
}
